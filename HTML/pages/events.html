<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events - RailMonitor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f8fafc;
            padding: 24px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 2rem;
            color: #1e293b;
        }

        .filters {
            display: flex;
            gap: 12px;
        }

        .filters select, .filters button {
            padding: 10px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            background: white;
            cursor: pointer;
        }

        .filters button {
            background: #22c55e;
            color: white;
            border: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
        }

        .stat-card .label {
            color: #64748b;
            font-size: 0.9rem;
        }

        .stat-card .value {
            font-size: 2rem;
            font-weight: 700;
            color: #1e293b;
            margin-top: 4px;
        }

        .event-card {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid;
        }

        .event-high { border-left-color: #ef4444; }
        .event-medium { border-left-color: #f59e0b; }
        .event-low { border-left-color: #22c55e; }

        .event-info {
            display: flex;
            gap: 24px;
            align-items: center;
        }

        .event-time {
            font-weight: 500;
            color: #1e293b;
        }

        .event-location {
            color: #64748b;
        }

        .event-peak {
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 30px;
        }

        .peak-high {
            background: #fee2e2;
            color: #b91c1c;
        }

        .peak-medium {
            background: #fef3c7;
            color: #92400e;
        }

        .peak-low {
            background: #dcfce7;
            color: #166534;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Impact Events</h1>
            <div class="filters">
                <select id="severityFilter">
                    <option value="all">All Severities</option>
                    <option value="high">High</option>
                    <option value="medium">Medium</option>
                    <option value="low">Low</option>
                </select>
                <button onclick="exportEvents()">
                    <i class="fas fa-download"></i> Export
                </button>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="label">Total Events</div>
                <div class="value" id="totalEvents">156</div>
            </div>
            <div class="stat-card">
                <div class="label">High Severity</div>
                <div class="value" id="highEvents">23</div>
            </div>
            <div class="stat-card">
                <div class="label">Medium Severity</div>
                <div class="value" id="mediumEvents">45</div>
            </div>
            <div class="stat-card">
                <div class="label">Low Severity</div>
                <div class="value" id="lowEvents">88</div>
            </div>
        </div>

        <div id="eventsList"></div>
    </div>

    <script>
        const events = [
            { time: '2024-03-12 14:32:18', location: 'KM 1392+450', peak: 16.8, severity: 'high' },
            { time: '2024-03-12 14:30:15', location: 'KM 1395+120', peak: 15.2, severity: 'high' },
            { time: '2024-03-12 14:25:42', location: 'KM 1401+780', peak: 7.3, severity: 'medium' },
            { time: '2024-03-12 14:20:33', location: 'KM 1405+230', peak: 6.9, severity: 'medium' },
            { time: '2024-03-12 14:15:21', location: 'KM 1412+560', peak: 2.8, severity: 'low' }
        ];

        function displayEvents() {
            const filter = document.getElementById('severityFilter').value;
            const filtered = filter === 'all' ? events : events.filter(e => e.severity === filter);
            
            document.getElementById('totalEvents').textContent = filtered.length;
            document.getElementById('highEvents').textContent = filtered.filter(e => e.severity === 'high').length;
            document.getElementById('mediumEvents').textContent = filtered.filter(e => e.severity === 'medium').length;
            document.getElementById('lowEvents').textContent = filtered.filter(e => e.severity === 'low').length;

            const list = document.getElementById('eventsList');
            list.innerHTML = filtered.map(event => `
                <div class="event-card event-${event.severity}">
                    <div class="event-info">
                        <span class="event-time">${event.time}</span>
                        <span class="event-location">${event.location}</span>
                    </div>
                    <span class="event-peak peak-${event.severity}">${event.peak.toFixed(1)} g</span>
                </div>
            `).join('');
        }

        function exportEvents() {
            alert('Events exported successfully!');
        }

        document.getElementById('severityFilter').addEventListener('change', displayEvents);
        displayEvents();
        window.exportEvents = exportEvents;
    </script>
</body>
</html>
