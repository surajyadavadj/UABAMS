<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceleration Analysis - RailMonitor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/pages/acceleration-analysis.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-left">
                <h1>Acceleration Analysis Report</h1>
                <p>Real-time impact analysis based on configured thresholds</p>
            </div>
            <div class="config-indicator">
                <div class="config-dot"></div>
                <span>Active Configuration</span>
                <a href="configuration.html" target="_parent">
                    <i class="fas fa-cog"></i> Configure
                </a>
            </div>
        </div>

        <!-- Active Thresholds Bar -->
        <div class="thresholds-bar" id="thresholdsBar">
            <!-- Populated by JavaScript -->
        </div>

        <!-- Statistics -->
        <div class="stats-grid" id="statsGrid">
            <!-- Populated by JavaScript -->
        </div>

        <!-- Report Table -->
        <div class="table-container">
            <div class="table-header">
                <h3>Impact Analysis Details</h3>
                <span class="record-count" id="recordCount">0 records</span>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>KM Location</th>
                        <th>GPS Coordinates</th>
                        <th>Peak Value</th>
                        <th>Applied Threshold</th>
                        <th>Priority Class</th>
                        <th>Speed</th>
                    </tr>
                </thead>
                <tbody id="reportBody">
                    <!-- Populated by JavaScript -->
                </tbody>
            </table>
        </div>

        <!-- Footer -->
        <div class="footer">
            <button class="btn" onclick="exportReport()">
                <i class="fas fa-download"></i> Download Analysis Report
            </button>
        </div>
    </div>

    <script src="../js/common.js"></script>
    <script src="../js/pages/acceleration-analysis.js"></script>
</body>
</html>
