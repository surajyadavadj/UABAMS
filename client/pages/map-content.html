<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geolocation Map - RailMonitor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/pages/map-content.css">
</head>
<body>
<div class="map-container">
    <h2 class="page-title">Geolocation Map</h2>

    <div class="map-controls">
        <div class="control-group">
            <label>Event Type:</label>
            <select id="eventTypeFilter" onchange="filterMapMarkers()">
                <option value="all">All Events</option>
                <option value="high">High Severity</option>
                <option value="medium">Medium Severity</option>
                <option value="low">Low Severity</option>
            </select>
        </div>
        <div class="control-group">
            <label>Time Range:</label>
            <select id="timeRangeFilter" onchange="filterMapMarkers()">
                <option value="1h">Last Hour</option>
                <option value="6h">Last 6 Hours</option>
                <option value="24h" selected>Last 24 Hours</option>
                <option value="7d">Last 7 Days</option>
            </select>
        </div>
        <button class="btn btn-primary" onclick="centerMap()">
            <i class="fas fa-crosshairs"></i> Center
        </button>
        <button class="btn btn-secondary" onclick="refreshMap()">
            <i class="fas fa-sync-alt"></i> Refresh
        </button>
    </div>

    <div class="map-wrapper">
        <div id="mapid" style="height: 500px; border-radius: 8px;"></div>
    </div>

    <div class="map-legend">
        <div class="legend-item">
            <span class="legend-dot high"></span>
            <span>High Severity (&gt;15g)</span>
        </div>
        <div class="legend-item">
            <span class="legend-dot medium"></span>
            <span>Medium Severity (5-15g)</span>
        </div>
        <div class="legend-item">
            <span class="legend-dot low"></span>
            <span>Low Severity (2-5g)</span>
        </div>
        <div class="legend-item">
            <span class="legend-dot normal"></span>
            <span>Normal Operation</span>
        </div>
    </div>

    <div class="events-sidebar" id="eventsSidebar">
        <h3>Recent Events</h3>
        <div id="recentEventsList" class="recent-events-list">
            <!-- Events will be populated here -->
        </div>
    </div>
</div>

<script src="../js/common.js"></script>
<script src="../js/pages/map-content.js"></script>
</body>
</html>
