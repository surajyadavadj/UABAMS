<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceleration Analysis - RailMonitor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        body {
            background: #f0f2f5;
            padding: 30px;
            color: #1e293b;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            background: white;
            padding: 20px 30px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .header-left h1 {
            font-size: 2rem;
            color: #1e293b;
            margin-bottom: 5px;
        }

        .header-left p {
            color: #64748b;
            font-size: 0.95rem;
        }

        .config-indicator {
            display: flex;
            align-items: center;
            gap: 15px;
            background: #f8fafc;
            padding: 10px 20px;
            border-radius: 40px;
            border: 1px solid #e2e8f0;
        }

        .config-dot {
            width: 10px;
            height: 10px;
            background: #22c55e;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }

        .config-indicator span {
            color: #1e293b;
            font-weight: 500;
        }

        .config-indicator a {
            color: #22c55e;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: 600;
            padding: 5px 12px;
            border-radius: 30px;
            background: white;
            border: 1px solid #e2e8f0;
        }

        .config-indicator a:hover {
            background: #f0fdf4;
            border-color: #22c55e;
        }

        /* Active Thresholds Bar */
        .thresholds-bar {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .threshold-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .threshold-marker {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .marker-p1 { background: #f59e0b; }
        .marker-p2 { background: #ef4444; }
        .marker-p3 { background: #7f1d1d; }

        .threshold-info {
            display: flex;
            flex-direction: column;
        }

        .threshold-label {
            font-size: 0.8rem;
            color: #64748b;
            text-transform: uppercase;
        }

        .threshold-value {
            font-weight: 600;
            color: #1e293b;
        }

        .peak-limits-info {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #64748b;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .stat-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            background: #f0fdf4;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #22c55e;
            font-size: 1.5rem;
        }

        .stat-content {
            flex: 1;
        }

        .stat-label {
            color: #64748b;
            font-size: 0.85rem;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: #1e293b;
            line-height: 1;
        }

        .stat-sub {
            color: #64748b;
            font-size: 0.8rem;
            margin-top: 5px;
        }

        /* Table */
        .table-container {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 25px;
        }

        .table-header {
            padding: 20px;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .table-header h3 {
            font-size: 1.2rem;
            color: #1e293b;
        }

        .record-count {
            background: #f1f5f9;
            padding: 5px 12px;
            border-radius: 30px;
            color: #1e293b;
            font-size: 0.9rem;
            font-weight: 500;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #f8fafc;
            padding: 16px;
            text-align: left;
            font-weight: 600;
            color: #1e293b;
            border-bottom: 2px solid #e2e8f0;
            font-size: 0.9rem;
        }

        td {
            padding: 16px;
            border-bottom: 1px solid #f1f5f9;
            color: #334155;
        }

        tr:hover {
            background: #f8fafc;
        }

        .priority-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .badge-p1 { background: #fef3c7; color: #92400e; }
        .badge-p2 { background: #fee2e2; color: #b91c1c; }
        .badge-p3 { background: #f1f5f9; color: #7f1d1d; }

        .threshold-highlight {
            font-family: 'Courier New', monospace;
            font-weight: 600;
            color: #22c55e;
        }

        /* Footer */
        .footer {
            display: flex;
            justify-content: flex-end;
        }

        .btn {
            padding: 14px 32px;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1rem;
            transition: all 0.3s;
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(34,197,94,0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(34,197,94,0.4);
        }

        .no-data {
            text-align: center;
            padding: 40px;
            color: #64748b;
            font-style: italic;
        }

        @media (max-width: 1200px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-left">
                <h1>Acceleration Analysis Report</h1>
                <p>Real-time impact analysis based on configured thresholds</p>
            </div>
            <div class="config-indicator">
                <div class="config-dot"></div>
                <span>Active Configuration</span>
                <a href="configuration.html" target="_parent">
                    <i class="fas fa-cog"></i> Configure
                </a>
            </div>
        </div>

        <!-- Active Thresholds Bar -->
        <div class="thresholds-bar" id="thresholdsBar">
            <!-- Populated by JavaScript -->
        </div>

        <!-- Statistics -->
        <div class="stats-grid" id="statsGrid">
            <!-- Populated by JavaScript -->
        </div>

        <!-- Report Table -->
        <div class="table-container">
            <div class="table-header">
                <h3>Impact Analysis Details</h3>
                <span class="record-count" id="recordCount">0 records</span>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>KM Location</th>
                        <th>GPS Coordinates</th>
                        <th>Peak Value</th>
                        <th>Applied Threshold</th>
                        <th>Priority Class</th>
                        <th>Speed</th>
                    </tr>
                </thead>
                <tbody id="reportBody">
                    <!-- Populated by JavaScript -->
                </tbody>
            </table>
        </div>

        <!-- Footer -->
        <div class="footer">
            <button class="btn" onclick="exportReport()">
                <i class="fas fa-download"></i> Download Analysis Report
            </button>
        </div>
    </div>

    <script>
        // Impact database
        const impacts = [
            { km: 1392, location: 'KM 1392+450', lat: 28.613567, lon: 77.209967, peak: 16.8, speed: 93.6 },
            { km: 1395, location: 'KM 1395+120', lat: 28.613040, lon: 77.210347, peak: 15.2, speed: 92.8 },
            { km: 1401, location: 'KM 1401+780', lat: 28.613351, lon: 77.210007, peak: 7.3, speed: 94.1 },
            { km: 1412, location: 'KM 1412+210', lat: 28.613030, lon: 77.210199, peak: 22.5, speed: 91.5 },
            { km: 1425, location: 'KM 1425+560', lat: 28.613697, lon: 77.210048, peak: 12.8, speed: 95.2 },
            { km: 1438, location: 'KM 1438+330', lat: 28.613946, lon: 77.209744, peak: 8.9, speed: 88.4 },
            { km: 1452, location: 'KM 1452+670', lat: 28.613975, lon: 77.209744, peak: 18.3, speed: 92.3 },
            { km: 1467, location: 'KM 1467+890', lat: 28.613511, lon: 77.210000, peak: 4.2, speed: 87.7 },
            { km: 1482, location: 'KM 1482+340', lat: 28.613656, lon: 77.209382, peak: 3.1, speed: 90.3 },
            { km: 1495, location: 'KM 1495+670', lat: 28.613557, lon: 77.210000, peak: 5.8, speed: 86.5 }
        ];

        // State
        let thresholds = {
            p1Min: 5,
            p1Max: 10,
            p2Min: 10,
            p2Max: 20,
            p3Min: 20
        };
        
        let peakLimits = [5, 10, 15, 20, 25, 30, 35, 40, 45, 50];

        // Load configuration
        function loadConfig() {
            try {
                const savedThresholds = localStorage.getItem('railmonitor_thresholds');
                if (savedThresholds) {
                    thresholds = JSON.parse(savedThresholds);
                }

                const savedLimits = localStorage.getItem('railmonitor_peak_limits');
                if (savedLimits) {
                    peakLimits = JSON.parse(savedLimits);
                }

                updateDisplay();
            } catch (e) {
                console.error('Error loading config:', e);
            }
        }

        // Get priority based on peak value
        function getPriority(peak) {
            if (peak > thresholds.p3Min) return { 
                class: 'P3', 
                name: 'Critical', 
                badge: 'badge-p3',
                threshold: thresholds.p3Min,
                color: '#b91c1c'
            };
            if (peak > thresholds.p2Min) return { 
                class: 'P2', 
                name: 'High', 
                badge: 'badge-p2',
                threshold: thresholds.p2Min,
                color: '#c2410c'
            };
            if (peak > thresholds.p1Min) return { 
                class: 'P1', 
                name: 'Medium', 
                badge: 'badge-p1',
                threshold: thresholds.p1Min,
                color: '#b45309'
            };
            return null;
        }

        // Get nearest peak limit
        function getNearestLimit(peak) {
            const sorted = [...peakLimits].sort((a, b) => a - b);
            for (let limit of sorted) {
                if (limit >= peak) {
                    return limit;
                }
            }
            return sorted[sorted.length - 1] || 50;
        }

        // Update thresholds bar
        function updateThresholdsBar() {
            document.getElementById('thresholdsBar').innerHTML = `
                <div class="threshold-item">
                    <div class="threshold-marker marker-p1"></div>
                    <div class="threshold-info">
                        <span class="threshold-label">P1 Medium</span>
                        <span class="threshold-value">${thresholds.p1Min}g - ${thresholds.p1Max}g</span>
                    </div>
                </div>
                <div class="threshold-item">
                    <div class="threshold-marker marker-p2"></div>
                    <div class="threshold-info">
                        <span class="threshold-label">P2 High</span>
                        <span class="threshold-value">${thresholds.p2Min}g - ${thresholds.p2Max}g</span>
                    </div>
                </div>
                <div class="threshold-item">
                    <div class="threshold-marker marker-p3"></div>
                    <div class="threshold-info">
                        <span class="threshold-label">P3 Critical</span>
                        <span class="threshold-value">> ${thresholds.p3Min}g</span>
                    </div>
                </div>
                <div class="peak-limits-info">
                    <i class="fas fa-chart-line"></i>
                    <span>Peak Limits: ${peakLimits.join(', ')}g</span>
                </div>
            `;
        }

        // Update statistics
        function updateStats() {
            const classified = impacts
                .map(i => ({ ...i, priority: getPriority(i.peak) }))
                .filter(i => i.priority);

            const total = classified.length;
            const p1Count = classified.filter(i => i.priority.class === 'P1').length;
            const p2Count = classified.filter(i => i.priority.class === 'P2').length;
            const p3Count = classified.filter(i => i.priority.class === 'P3').length;
            
            const avgPeak = total > 0 ? (classified.reduce((sum, i) => sum + i.peak, 0) / total).toFixed(1) : 0;
            const maxPeak = total > 0 ? Math.max(...classified.map(i => i.peak)).toFixed(1) : 0;

            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-chart-bar"></i></div>
                    <div class="stat-content">
                        <div class="stat-label">Total Exceeding</div>
                        <div class="stat-value">${total}</div>
                        <div class="stat-sub">out of ${impacts.length} total</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-layer-group"></i></div>
                    <div class="stat-content">
                        <div class="stat-label">By Priority</div>
                        <div class="stat-value">P1:${p1Count} P2:${p2Count} P3:${p3Count}</div>
                        <div class="stat-sub">distribution</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-calculator"></i></div>
                    <div class="stat-content">
                        <div class="stat-label">Average Peak</div>
                        <div class="stat-value">${avgPeak}g</div>
                        <div class="stat-sub">across all</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-arrow-up"></i></div>
                    <div class="stat-content">
                        <div class="stat-label">Maximum Peak</div>
                        <div class="stat-value">${maxPeak}g</div>
                        <div class="stat-sub">${maxPeak > thresholds.p3Min ? 'Critical' : maxPeak > thresholds.p2Min ? 'High' : 'Medium'}</div>
                    </div>
                </div>
            `;

            document.getElementById('recordCount').textContent = `${total} records`;
        }

        // Update report table
        function updateReport() {
            const classified = impacts
                .map(i => ({ 
                    ...i, 
                    priority: getPriority(i.peak),
                    nearestLimit: getNearestLimit(i.peak)
                }))
                .filter(i => i.priority)
                .sort((a, b) => b.peak - a.peak);

            if (classified.length === 0) {
                document.getElementById('reportBody').innerHTML = `
                    <tr>
                        <td colspan="6" class="no-data">No impacts exceed current thresholds</td>
                    </tr>
                `;
                return;
            }

            document.getElementById('reportBody').innerHTML = classified.map(i => `
                <tr>
                    <td><strong>${i.location}</strong></td>
                    <td style="font-family: monospace;">${i.lat.toFixed(6)}° N, ${i.lon.toFixed(6)}° E</td>
                    <td style="color: ${i.priority.color}; font-weight: 600;">${i.peak.toFixed(1)} g</td>
                    <td><span class="threshold-highlight">${i.priority.threshold} g</span> (ref: ${i.nearestLimit}g)</td>
                    <td><span class="priority-badge ${i.priority.badge}">${i.priority.class}</span></td>
                    <td>${i.speed.toFixed(1)} km/h</td>
                </tr>
            `).join('');
        }

        // Update all displays
        function updateDisplay() {
            updateThresholdsBar();
            updateStats();
            updateReport();
        }

        // Export report
        function exportReport() {
            const classified = impacts
                .map(i => ({ 
                    ...i, 
                    priority: getPriority(i.peak),
                    nearestLimit: getNearestLimit(i.peak)
                }))
                .filter(i => i.priority)
                .sort((a, b) => b.peak - a.peak);

            if (classified.length === 0) {
                alert('No data to export');
                return;
            }

            const headers = ['KM Location', 'GPS Coordinates', 'Peak (g)', 'Applied Threshold (g)', 'Peak Limit (g)', 'Priority Class', 'Speed (km/h)'];
            const rows = classified.map(i => [
                i.location,
                `${i.lat.toFixed(6)}° N, ${i.lon.toFixed(6)}° E`,
                i.peak.toFixed(1),
                i.priority.threshold,
                i.nearestLimit,
                i.priority.class,
                i.speed.toFixed(1)
            ]);
            
            const csvContent = [headers, ...rows].map(row => row.join(',')).join('\n');
            
            const metadata = [
                `Report Generated: ${new Date().toLocaleString()}`,
                `Active Thresholds: P1:${thresholds.p1Min}-${thresholds.p1Max}g, P2:${thresholds.p2Min}-${thresholds.p2Max}g, P3:>${thresholds.p3Min}g`,
                `Peak Limits: ${peakLimits.join(', ')}g`,
                `Total Records: ${classified.length}`,
                ''
            ];
            
            const fullReport = metadata.join('\n') + csvContent;
            
            const blob = new Blob([fullReport], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Acceleration_Analysis_${new Date().toISOString().slice(0,10)}.csv`;
            a.click();
            window.URL.revokeObjectURL(url);
        }

        // Listen for storage changes
        window.addEventListener('storage', function(e) {
            if (e.key === 'railmonitor_thresholds' || e.key === 'railmonitor_peak_limits') {
                loadConfig();
            }
        });

        // Check for updates
        setInterval(loadConfig, 2000);

        // Initial load
        loadConfig();

        // Make function global
        window.exportReport = exportReport;
    </script>
</body>
</html>
